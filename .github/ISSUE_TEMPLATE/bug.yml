name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Step-by-step to reproduce. Include commands, inputs, and expected output.
      placeholder: |
        1. Run `...`
        2. Observe `...`
        3. Expected `...`, got `...`
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag, version, or commit hash where this was observed.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python or Node version, hardware (if relevant).
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant output. Use code blocks.
    validations:
      required: false
